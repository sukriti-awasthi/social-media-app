<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h2>Create Account</h2>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button onclick="signup()">
            Signup
        </button>

        <p>
            Already have an account?

            <a href="login.html">
                Login
            </a>

        </p>

    </div>

</div>

<script src="js/signup.js"></script>

</body>
</html>
